<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
        <script src="js/bootstrap.min.js"></script>
</head>
<body>
    
    
    
    <div class="bg-light">
        <div class="container py-5">
            <div class="search-wrapper">
                <div class="search-box">
                    <input type="text" class="search-input form-control" placeholder="Search anything...">
                    <i class="fas fa-search search-icon"></i>
    
                    <div class="suggestions">
                        <div class="recent-searches">Recent Searches</div>
                        <div class="suggestion-item">
                            <i class="fas fa-history"></i>
                            Wireless Headphones
                        </div>
                        <div class="suggestion-item">
                            <i class="fas fa-history"></i>
                            Smart Watches
                        </div>
                        <div class="suggestion-item">
                            <i class="fas fa-search"></i>
                            Popular: Latest Smartphones
                        </div>
                        <div class="suggestion-item">
                            <i class="fas fa-fire"></i>
                            Trending: Fitness Trackers
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <input type="search" aria-label="search" aria-describedby="search-addon" placeholder="search.." class="form-control rounded"/>
            <span class="input-group-text border-0" id="search-addon">
                <i class="fas fa-search"></i>
            </span>
    </div>
    <div class="container">
        <div class="input-group rounded">
            <input type="search" class="form-control rounded" placeholder="Search" aria-label="Search"
                aria-describedby="search-addon" />
            <span class="input-group-text border-0" id="search-addon">
                <i class="fas fa-search"></i>
            </span>
        </div>
    </div>
        <div class="input-group rounded">
            <input type="search" class="form-control rounded" placeholder="Search" aria-label="Search"
                aria-describedby="search-addon" />
            <span class="input-group-text border-0" id="search-addon">
                <i class="fas fa-search"></i>
            </span>
        </div>

        <div class="container">
            <div class="input-group">
                <input type="search" class="form-control rounded" placeholder="Search" aria-label="Search"
                    aria-describedby="search-addon" />
                <button type="button" class="btn btn-outline-primary" data-mdb-ripple-init>search</button>
            </div>
        </div>

        
</body>
</html>
